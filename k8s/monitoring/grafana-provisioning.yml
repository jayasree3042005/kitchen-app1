apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: kitchen-app
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards