name: Kitchen App CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        working-directory: api
        run: npm install

      - name: Run lint
        working-directory: api
        run: npm run lint || echo "Lint skipped"

  docker-build:

    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t kitchen-api:ci ./api --target production

      - name: Build Web image
        run: docker build -t kitchen-web:ci ./web-ui

  k8s-smoke-test:

    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate manifests
        run: |
          test -f k8s/namespace.yaml
          test -f k8s/db/statefulset.yaml
          test -f k8s/api/deployment.yaml
          test -f k8s/web-ui/deployment.yaml
          